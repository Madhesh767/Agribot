<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FarmBot - Admin Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header class="bg-success text-white text-center py-3">
    <h1>FarmBot</h1>
    <p>Your Farming Companion</p>
    <nav>
      <a href="/" class="text-white mx-2">Home</a> |
      <a href="/chat" class="text-white mx-2">Chatbot</a> |
      <a href="/crop_animation" class="text-white mx-2">Crop Animation</a> |
      <a href="/farmer_schemes" class="text-white mx-2">Farmer Schemes</a>
    </nav>
  </header>
  <main class="container my-5">
    <div class="card shadow p-4" style="max-width:400px;margin:0 auto;">
      <h2 class="text-success text-center">Admin Login</h2>
      <div id="error-msg" class="alert alert-danger" style="display:none;"></div>
      <form id="login-form" onsubmit="doLogin(event)">
        <div class="mb-3">
          <label class="form-label">Username:</label>
          <input type="text" name="username" class="form-control" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Password:</label>
          <input type="password" name="password" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-success w-100" id="login-btn">Login</button>
      </form>
    </div>
  </main>
  <footer class="bg-dark text-white text-center py-3 fixed-bottom">
    <p>© 2025 FarmBot | Built with ❤️ by MADD</p>
  </footer>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
  <script>
    async function doLogin(e) {
      e.preventDefault();
      const form = document.getElementById('login-form');
      const btn = document.getElementById('login-btn');
      const errorEl = document.getElementById('error-msg');
      errorEl.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Logging in...';

      try {
        const res = await fetch('/.netlify/functions/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: form.username.value, password: form.password.value })
        });
        const data = await res.json();
        if (data.success) {
          sessionStorage.setItem('admin_logged_in', '1');
          window.location.href = '/farmer_schemes';
        } else {
          errorEl.textContent = data.error || 'Wrong username or password lah!';
          errorEl.style.display = 'block';
        }
      } catch (err) {
        errorEl.textContent = 'Login failed: ' + err.message;
        errorEl.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Login';
      }
    }
  </script>
</body>
</html>
