<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FarmBot - Farmer Schemes</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header class="bg-success text-white text-center py-3">
    <h1>FarmBot</h1>
    <p>Your Farming Companion</p>
    <nav>
      <a href="/" class="text-white mx-2">Home</a> |
      <a href="/chat" class="text-white mx-2">Chatbot</a> |
      <a href="/crop_animation" class="text-white mx-2">Crop Animation</a> |
      <a href="/farmer_schemes" class="text-white mx-2">Farmer Schemes</a>
    </nav>
  </header>
  <main class="container my-5">
    <div class="card shadow p-4">
      <h2 class="text-success">Farmer Government Schemes</h2>
      <h3>Schemes List</h3>
      <div id="schemes-list">
        <div class="text-muted">Loading schemes...</div>
      </div>
      <a href="/" class="btn btn-outline-success mt-3">Back Home</a>
    </div>
  </main>
  <footer class="bg-dark text-white text-center py-3 fixed-bottom">
    <p>© 2025 FarmBot | Built with ❤️ by MADD</p>
  </footer>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
  <script>
    async function loadSchemes() {
      const container = document.getElementById('schemes-list');
      try {
        const res = await fetch('/.netlify/functions/schemes');
        const schemes = await res.json();
        if (!schemes.length) {
          container.innerHTML = '<p class="text-muted">No schemes available lah.</p>';
          return;
        }
        container.innerHTML = schemes.map(s =>
          `<div class="alert alert-info"><strong>${s.name}</strong><br>${s.description}</div>`
        ).join('');
      } catch (err) {
        container.innerHTML = `<p class="text-danger">Failed to load schemes: ${err.message}</p>`;
      }
    }
    loadSchemes();
  </script>
</body>
</html>
