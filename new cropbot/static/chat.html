<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FarmBot - Chat Bro</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    body { background-color: #f8f9fa; font-family: Arial, sans-serif; }
    .chat-container { max-width: 700px; margin: 50px auto; padding: 20px; background: #fff; border-radius: 15px; box-shadow: 0 4px 8px rgba(0,0,0,.1); }
    .chat-header { color: #2e7d32; font-weight: bold; text-align: center; }
    .response-box { background: #e9ecef; padding: 15px; border-radius: 10px; margin-top: 20px; word-wrap: break-word; min-height: 60px; }
    .btn-send { background: #4caf50; border: none; padding: 10px 20px; }
    .btn-send:hover { background: #45a049; }
  </style>
</head>
<body>
  <header class="bg-success text-white text-center py-3">
    <h1>FarmBot</h1>
    <p>Your Farming Companion</p>
    <nav>
      <a href="/" class="text-white mx-2">Home</a> |
      <a href="/chat" class="text-white mx-2">Chatbot</a> |
      <a href="/crop_animation" class="text-white mx-2">Crop Animation</a> |
      <a href="/farmer_schemes" class="text-white mx-2">Farmer Schemes</a>
    </nav>
  </header>
  <div class="chat-container">
    <h1 class="chat-header">FarmBot Chat Bro</h1>
    <form id="chat-form" onsubmit="sendMessage(event)">
      <div class="mb-3">
        <input type="text" id="user-input" class="form-control" placeholder="Say something..." required>
      </div>
      <button type="submit" class="btn btn-send text-white" id="send-btn">Send</button>
    </form>
    <h3 class="mt-4">Bro's Reply:</h3>
    <div class="response-box">
      <p id="bot-response">Ask me something lah!</p>
    </div>
  </div>
  <footer class="bg-dark text-white text-center py-3 fixed-bottom">
    <p>© 2025 FarmBot | Built with ❤️ by MADD</p>
  </footer>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
  <script>
    async function sendMessage(e) {
      e.preventDefault();
      const input = document.getElementById('user-input');
      const btn = document.getElementById('send-btn');
      const responseEl = document.getElementById('bot-response');

      if (!input.value.trim()) { alert("Oi, don't leave it blank lah!"); return; }

      btn.disabled = true;
      btn.textContent = 'Sending...';
      responseEl.textContent = 'Thinking...';

      try {
        const res = await fetch('/.netlify/functions/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: input.value })
        });
        const data = await res.json();
        responseEl.textContent = data.response || data.error || 'No reply lah';
      } catch (err) {
        responseEl.textContent = 'Aiyo, connection problem: ' + err.message;
      } finally {
        btn.disabled = false;
        btn.textContent = 'Send';
      }
    }
  </script>
</body>
</html>
