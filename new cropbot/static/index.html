<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FarmBot - Agricultural Assistant</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header class="bg-success text-white text-center py-3">
    <h1>FarmBot</h1>
    <p>Your Farming Companion</p>
    <nav>
      <a href="/" class="text-white mx-2">Home</a> |
      <a href="/chat" class="text-white mx-2">Chatbot</a> |
      <a href="/crop_animation" class="text-white mx-2">Crop Animation</a> |
      <a href="/farmer_schemes" class="text-white mx-2">Farmer Schemes</a>
    </nav>
  </header>
  <main class="container my-5">
    <div class="card shadow p-4">
      <h2 class="text-success">FarmBot - Crop Recommendation</h2>
      <div id="error-msg" class="alert alert-danger" style="display:none;"></div>

      <form id="predict-form" onsubmit="submitPrediction(event)">
        <div class="mb-3">
          <label class="form-label">Nitrogen (N):</label>
          <input type="number" name="N" class="form-control" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Phosphorus (P):</label>
          <input type="number" name="P" class="form-control" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Potassium (K):</label>
          <input type="number" name="K" class="form-control" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Temperature (°C):</label>
          <input type="number" name="temperature" step="0.1" class="form-control" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Humidity (%):</label>
          <input type="number" name="humidity" class="form-control" required>
        </div>
        <div class="mb-3">
          <label class="form-label">pH:</label>
          <input type="number" name="ph" step="0.1" class="form-control" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Rainfall (mm):</label>
          <input type="number" name="rainfall" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-success" id="submit-btn">Get Recommendations</button>
      </form>

      <div id="results" style="display:none;" class="mt-4">
        <h3 class="text-success">Results</h3>
        <p><strong>Recommended Crop: <span id="crop-name"></span></strong></p>
        <h4>Recommendations</h4>
        <div id="recommendations-list"></div>
        <button class="btn btn-outline-success mt-3" onclick="resetForm()">Try Again</button>
      </div>
    </div>
  </main>
  <footer class="bg-dark text-white text-center py-3 fixed-bottom">
    <p>© 2025 FarmBot | Built with ❤️ by MADD</p>
  </footer>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
  <script>
    async function submitPrediction(e) {
      e.preventDefault();
      const form = document.getElementById('predict-form');
      const btn = document.getElementById('submit-btn');
      const errorEl = document.getElementById('error-msg');

      errorEl.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Calculating...';

      const data = {
        N: parseFloat(form.N.value),
        P: parseFloat(form.P.value),
        K: parseFloat(form.K.value),
        temperature: parseFloat(form.temperature.value),
        humidity: parseFloat(form.humidity.value),
        ph: parseFloat(form.ph.value),
        rainfall: parseFloat(form.rainfall.value)
      };

      try {
        const res = await fetch('/.netlify/functions/predict', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });
        const result = await res.json();
        if (!res.ok) throw new Error(result.error || 'Prediction failed');

        document.getElementById('crop-name').textContent = result.crop;
        const recList = document.getElementById('recommendations-list');
        recList.innerHTML = result.recommendations
          .map(r => `<div class="alert alert-info">${r}</div>`)
          .join('');

        form.style.display = 'none';
        document.getElementById('results').style.display = 'block';
      } catch (err) {
        errorEl.textContent = 'Prediction failed lah: ' + err.message;
        errorEl.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Get Recommendations';
      }
    }

    function resetForm() {
      document.getElementById('predict-form').reset();
      document.getElementById('predict-form').style.display = 'block';
      document.getElementById('results').style.display = 'none';
      document.getElementById('error-msg').style.display = 'none';
    }
  </script>
</body>
</html>
